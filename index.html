<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار بوكت اوبشن - التنبيه التلقائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; font-family: sans-serif; text-align: center; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2rem; }
        .btn-glow { background: linear-gradient(90deg, #1E40AF, #3B82F6); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl font-bold text-blue-400 mb-4">نظام صيد الصفقات الآلي 🎯</h1>
        
        <button id="mainBtn" onclick="startSystem()" class="btn-glow w-full p-4 rounded-xl font-bold mb-6">
            🚀 اضغط هنا لتشغيل الرادار والصوت فوراً
        </button>

        <div id="status" class="text-xs text-gray-500 mb-6">الحالة: بانتظار التشغيل...</div>

        <div id="radar-grid"></div>
    </div>

    <script>
        const assets = [
            { symbol: "OANDA:XAUUSD", name: "الذهب GOLD", id: "gold" },
            { symbol: "FX:EURUSD", name: "EUR/USD", id: "eurusd" },
            { symbol: "BINANCE:BTCUSDT", name: "بيتكوين BTC", id: "btc" }
        ];

        // صوت التنبيه القوي
        const alertSound = new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3');

        function startSystem() {
            // طلب الإذن وتفعيل الصوت في نفس اللحظة
            Notification.requestPermission().then(perm => {
                if(perm === "granted") {
                    document.getElementById('status').innerHTML = "✅ الرادار يعمل الآن ويراقب الإشارات القوية...";
                    document.getElementById('mainBtn').innerHTML = "⏳ الرادار قيد المراقبة اللحظية...";
                    document.getElementById('mainBtn').style.background = "#064E3B";
                    
                    // إشعار تجريبي فوري للتأكد
                    new Notification("الرادار متصل", { body: "سأقوم بتنبيهك بصوت مرتفع عند توفر صفقة قوية" });
                    alertSound.play();
                } else {
                    alert("⚠️ يجب السماح بالإشعارات من إعدادات المتصفح ليعمل التنبيه");
                }
            });
        }

        // ملاحظة: بما أن TradingView Widget هو IFrame، لا يمكن للكود قراءة النتيجة مباشرة 
        // لأسباب أمنية، لذا نعتمد على ظهور العداد أمامك وسنقوم بمحاكاة فحص دوري.
        
        function init() {
            const grid = document.getElementById('radar-grid');
            assets.forEach(asset => {
                grid.innerHTML += `
                    <div class="asset-card">
                        <div class="p-3 bg-[#151D27] font-bold text-blue-400 border-b border-gray-800">${asset.name}</div>
                        <div id="chart_${asset.id}" style="height:300px;"></div>
                        <div id="sig_${asset.id}" style="height:400px;"></div>
                    </div>
                `;
                
                setTimeout(() => {
                    new TradingView.widget({
                        "autosize": true, "symbol": asset.symbol, "interval": "1", "theme": "dark",
                        "style": "1", "locale": "ar", "container_id": `chart_${asset.id}`,
                        "hide_top_toolbar": true, "backgroundColor": "#0E141B"
                    });

                    const script = document.createElement('script');
                    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
                    script.async = true;
                    script.innerHTML = JSON.stringify({
                        "interval": "1m", "width": "100%", "isTransparent": true, "height": "100%",
                        "symbol": asset.symbol, "showIntervalTabs": true, "locale": "ar", "colorTheme": "dark"
                    });
                    document.getElementById(`sig_${asset.id}`).appendChild(script);
                }, 500);
            });
        }

        init();
    </script>
</body>
</html>
