<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناص بوكت اوبشن - Pocket Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; font-family: sans-serif; }
        .asset-card { background: #0E141B; border: 2px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2rem; }
        .signal-header { background: #151D27; padding: 1rem; border-bottom: 1px solid #1E293B; }
        .chart-container { height: 300px; }
        .analysis-container { height: 450px; }
        .best-time { background: #1E40AF; color: #60A5FA; padding: 4px 12px; rounded-full; font-size: 10px; font-bold; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto mb-6 text-center">
        <h1 class="text-2xl font-black text-blue-500 uppercase italic">Pocket Sniper v7</h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">مخصص لصفقات الـ 1 دقيقة والـ 5 دقائق</p>
    </div>

    <div class="max-w-4xl mx-auto" id="grid">
        </div>

    <script>
        const assets = [
            { symbol: "OANDA:XAUUSD", name: "GOLD (الذهب)", id: "gold" },
            { symbol: "FX:EURUSD", name: "EUR/USD", id: "eurusd" },
            { symbol: "FX:GBPUSD", name: "GBP/USD", id: "gbpusd" },
            { symbol: "BINANCE:BTCUSDT", name: "BTC/USDT", id: "btc" }
        ];

        function render() {
            const grid = document.getElementById('grid');
            assets.forEach(asset => {
                grid.innerHTML += `
                    <div class="asset-card">
                        <div class="signal-header flex justify-between items-center">
                            <div>
                                <h2 class="font-bold text-blue-400">${asset.name}</h2>
                                <span class="best-time">مدة الصفقة المفضلة: 1m - 5m</span>
                            </div>
                            <div class="text-[10px] text-green-500 animate-pulse font-mono">LIVE ●</div>
                        </div>
                        <div id="chart_${asset.id}" class="chart-container"></div>
                        <div id="sig_${asset.id}" class="analysis-container"></div>
                    </div>
                `;
            });
        }

        window.onload = function() {
            render();
            assets.forEach(asset => {
                // 1. الرسم البياني (Candlesticks)
                new TradingView.widget({
                    "autosize": true, "symbol": asset.symbol, "interval": "1", "theme": "dark", "style": "1",
                    "locale": "ar", "hide_top_toolbar": true, "container_id": `chart_${asset.id}`, "backgroundColor": "#0E141B"
                });

                // 2. المحلل التقني (المؤشرات والمتوسطات)
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "interval": "1m", "width": "100%", "isTransparent": true, "height": "100%",
                    "symbol": asset.symbol, "showIntervalTabs": true, "locale": "ar", "colorTheme": "dark"
                });
                document.getElementById(`sig_${asset.id}`).appendChild(script);
            });
        };
    </script>
</body>
</html>
