<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار القناص الاحترافي - نظام العمليات المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; text-align: center; font-family: sans-serif; }
        .filter-section { background: #0E141B; border: 1px solid #1E293B; border-radius: 1rem; padding: 15px; margin-bottom: 20px; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2.5rem; display: none; }
        .asset-card.active { display: block; }
        .checkbox-item { display: inline-flex; align-items: center; background: #151D27; padding: 5px 12px; border-radius: 8px; margin: 4px; border: 1px solid #1E293B; cursor: pointer; font-size: 10px; font-weight: bold; }
        .checkbox-item input { margin-left: 6px; }
        #candleTimer { font-size: 1.2rem; font-weight: 900; transition: 0.3s; }
        .pulse-btn { animation: shadow-pulse 1.5s infinite; background: #064E3B !important; }
        @keyframes shadow-pulse { 0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto mb-4 sticky top-0 z-50">
        <div id="candleTimer" class="bg-black/80 backdrop-blur-md p-3 rounded-xl border border-gray-800 mb-2">
            ⏳ بانتظار تشغيل العداد...
        </div>
        <button id="actionBtn" onclick="runPulseSystem()" class="w-full p-4 bg-blue-600 rounded-xl font-black shadow-lg">
            🚀 تشغيل نظام المراقبة اللحظية
        </button>
    </div>

    <div class="max-w-4xl mx-auto mb-6">
        <div class="bg-gray-900 p-2 rounded-t-xl text-[10px] font-bold text-blue-400">خريطة قوة العملات (Heat Map)</div>
        <div id="power_meter" style="height: 160px; width: 100%;"></div>
    </div>

    <div class="filter-section max-w-4xl mx-auto">
        <p class="text-[10px] text-gray-500 mb-3 uppercase font-bold">تصفية الأزواج (مفعلة تلقائياً ✅):</p>
        <div id="filter-controls" class="flex flex-wrap justify-center"></div>
    </div>

    <div id="radar-grid" class="max-w-4xl mx-auto"></div>

    <script>
        let secondsPassed = 0;
        const pairs = [
            {s:"OANDA:XAUUSD", n:"الذهب GOLD", id:"gold"},
            {s:"BINANCE:BTCUSDT", n:"بيتكوين BTC", id:"btc"},
            {s:"FX:EURUSD", n:"EUR/USD", id:"eurusd"},
            {s:"FX:GBPUSD", n:"GBP/USD", id:"gbpusd"},
            {s:"FX:USDJPY", n:"USD/JPY", id:"usdjpy"},
            {s:"FX:AUDUSD", n:"AUD/USD", id:"audusd"},
            {s:"FX:USDCAD", n:"USD/CAD", id:"usdcad"},
            {s:"FX:USDCHF", n:"USD/CHF", id:"usdchf"},
            {s:"FX:NZDUSD", n:"NZD/USD", id:"nzdusd"},
            {s:"FX:EURGBP", n:"EUR/GBP", id:"eurgbp"},
            {s:"FX:EURJPY", n:"EUR/JPY", id:"eurjpy"},
            {s:"FX:GBPJPY", n:"GBP/JPY", id:"gbpjpy"},
            {s:"FX:AUDJPY", n:"AUD/JPY", id:"audjpy"},
            {s:"FX:EURCAD", n:"EUR/CAD", id:"eurcad"}
        ];

        function runPulseSystem() {
            document.getElementById('actionBtn').classList.add('pulse-btn');
            
            // بدء عداد الثواني التراكمي + عداد الشمعة التنازلي
            setInterval(() => {
                secondsPassed++;
                document.getElementById('actionBtn').innerHTML = `🎯 النظام يعمل (نبضة: ${secondsPassed})`;
                
                // حساب الوقت المتبقي لشمعة الدقيقة
                const now = new Date();
                const timeLeft = 60 - now.getSeconds();
                const timerDisplay = document.getElementById('candleTimer');
                
                timerDisplay.innerHTML = `⏳ المتبقي للشمعة: ${timeLeft} ثانية`;
                
                // تغيير اللون للتحذير
                if(timeLeft <= 10) {
                    timerDisplay.style.color = "#FF4444"; // أحمر
                    timerDisplay.style.borderColor = "#FF4444";
                } else {
                    timerDisplay.style.color = "#00FF88"; // أخضر
                    timerDisplay.style.borderColor = "#1E293B";
                }
            }, 1000);
        }

        function toggleAsset(id) {
            const card = document.getElementById(`card_${id}`);
            const checkbox = document.getElementById(`check_${id}`);
            if (checkbox.checked) card.classList.add('active');
            else card.classList.remove('active');
        }

        function init() {
            // تشغيل مؤشر القوة
            const meterScript = document.createElement('script');
            meterScript.src = "https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js";
            meterScript.async = true;
            meterScript.innerHTML = JSON.stringify({
                "width": "100%", "height": "100%", "currencies": ["EUR","USD","JPY","GBP","AUD","CAD","CHF","NZD"],
                "isTransparent": true, "colorTheme": "dark", "locale": "ar"
            });
            document.getElementById('power_meter').appendChild(meterScript);

            const grid = document.getElementById('radar-grid');
            const controls = document.getElementById('filter-controls');

            pairs.forEach((p, index) => {
                controls.innerHTML += `<label class="checkbox-item"><input type="checkbox" id="check_${p.id}" onchange="toggleAsset('${p.id}')" checked> ${p.n}</label>`;
                grid.innerHTML += `
                    <div class="asset-card active" id="card_${p.id}">
                        <div class="p-3 bg-gray-900 font-bold text-blue-400 border-b border-gray-800">${p.n}</div>
                        <div id="c_${p.id}" style="height:280px;"></div>
                        <div id="t_${p.id}" style="height:410px;"></div>
                    </div>`;

                setTimeout(() => {
                    new TradingView.widget({"autosize":true,"symbol":p.s,"interval":"1","theme":"dark","container_id":`c_${p.id}`,"hide_top_toolbar":true,"backgroundColor":"#0E141B"});
                    const s = document.createElement('script');
                    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
                    s.async = true;
                    s.innerHTML = JSON.stringify({"interval":"1m","width":"100%","height":"100%","symbol":p.s,"colorTheme":"dark","locale":"ar"});
                    document.getElementById(`t_${p.id}`).appendChild(s);
                }, (index + 1) * 800);
            });
        }
        init();
    </script>
</body>
</html>
