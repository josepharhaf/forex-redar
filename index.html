<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار أرهاف - نظام النبض الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; text-align: center; font-family: sans-serif; overflow-x: hidden; }
        .filter-section { background: #0E141B; border: 1px solid #1E293B; border-radius: 1rem; padding: 15px; margin-bottom: 20px; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2.5rem; }
        .score-badge { padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .buy-color { background: #00897b; color: white; box-shadow: 0 0 10px #00897b; }
        .sell-color { background: #ff5252; color: white; box-shadow: 0 0 10px #ff5252; }
        .neutral-color { background: #1e293b; color: #94a3b8; }
        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <h1 class="text-blue-500 font-black mb-2 italic text-xl">ARHAF PULSE V65.5</h1>
    <div id="connection-indicator" class="text-[10px] mb-4 text-gray-500 uppercase tracking-widest">
        الحالة: <span id="status-text" class="text-red-500">غير متصل</span>
    </div>

    <button id="actionBtn" onclick="activateEngine()" class="max-w-4xl w-full p-5 bg-blue-600 rounded-2xl font-black text-lg mb-8 hover:bg-blue-500 transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)] active:scale-95">
        ⚡ تفعيل نظام الاكتساح اللحظي
    </button>
    
    <div id="radar-grid" class="max-w-4xl mx-auto"></div>

    <script>
        const BOT_TOKEN = "7736594416:AAHZhDMnQmtASFPkKJC4fKIIr8Z-e7UXtak"; 
        const CHAT_ID = "1234596704"; 

        const pairs = [
            {s:"OANDA:XAUUSD", n:"الذهب GOLD", id:"gold", ticker:"OANDA:XAUUSD"},
            {s:"FX:EURUSD", n:"EUR/USD", id:"eurusd", ticker:"FX:EURUSD"},
            {s:"FX:GBPUSD", n:"GBP/USD", id:"gbpusd", ticker:"FX:GBPUSD"},
            {s:"FX:USDJPY", n:"USD/JPY", id:"usdjpy", ticker:"FX:USDJPY"},
            {s:"FX:AUDUSD", n:"AUD/USD", id:"audusd", ticker:"FX:AUDUSD"},
            {s:"FX:EURJPY", n:"EUR/JPY", id:"eurjpy", ticker:"FX:EURJPY"},
            {s:"FX:GBPJPY", n:"GBP/JPY", id:"gbpjpy", ticker:"FX:GBPJPY"},
            {s:"FX:EURCAD", n:"EUR/CAD", id:"eurcad", ticker:"FX:EURCAD"}
        ];

        let isEngineActive = false;
        let lastAlertTime = {};

        async function checkSignals() {
            if (!isEngineActive) return;

            try {
                const response = await fetch('https://scanner.tradingview.com/forex/scan', {
                    method: 'POST',
                    body: JSON.stringify({
                        "symbols": { "tickers": pairs.map(p => p.ticker) },
                        "columns": ["Recommend.All"]
                    })
                });
                const data = await response.json();

                data.data.forEach((result, index) => {
                    const score = parseFloat(result.d[0]).toFixed(2);
                    const pairId = pairs[index].id;
                    const pairName = pairs[index].n;

                    const badge = document.getElementById(`score_${pairId}`);
                    if (badge) {
                        badge.innerHTML = score;
                        badge.className = `score-badge ${score >= 0.65 ? 'buy-color' : (score <= -0.65 ? 'sell-color' : 'neutral-color')}`;
                    }

                    // نظام التنبيه - تم رفع الحساسية لـ 0.65 لضمان الجودة
                    if (score <= -0.65) {
                        sendTeleAlert(pairName, score, "🔴 بيع قوي جداً");
                    } else if (score >= 0.65) {
                        sendTeleAlert(pairName, score, "🟢 شراء قوي جداً");
                    }
                });
            } catch (e) { 
                console.log("إعادة محاولة الاتصال..."); 
            }
        }

        function sendTeleAlert(name, score, type) {
            const now = Date.now();
            // تقليل وقت منع التكرار لدقيقتين لاقتناص الفرص السريعة
            if (lastAlertTime[name] && (now - lastAlertTime[name] < 120000)) return;

            const message = `🎯 <b>اكتساح رقمي مكتمل!</b>\n\n💰 الأداة: <b>${name}</b>\n📊 القوة: <b>${score}</b>\n⚡ الإشارة: <b>${type}</b>\n\n✅ <i>الإشارة مدعومة بإجماع المؤشرات الفنية</i>`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`)
            .then(res => {
                if(res.ok) lastAlertTime[name] = now;
            });
        }

        function activateEngine() {
            isEngineActive = true;
            const btn = document.getElementById('actionBtn');
            btn.className = "max-w-4xl w-full p-5 bg-green-700 rounded-2xl font-black text-lg mb-8 shadow-[0_0_20px_rgba(21,128,61,0.5)] pulse-live";
            btn.innerHTML = "🎯 الرادار يراقب ويرسل الآن...";
            document.getElementById('status-text').innerHTML = "متصل ونشط برمجياً ✅";
            document.getElementById('status-text').className = "text-green-500";

            // فحص مكثف كل 8 ثوانٍ
            setInterval(checkSignals, 8000);
            
            // إرسال نبضة تأكيد فورية للتلجرام
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("✅ <b>تم تفعيل نظام النبض الرقمي!</b>\nسأبدأ بإرسال الإشارات القوية فوراً.")}&parse_mode=HTML`);
        }

        function init() {
            const grid = document.getElementById('radar-grid');
            pairs.forEach(p => {
                grid.innerHTML += `
                    <div class="asset-card" id="card_${p.id}">
                        <div class="p-3 bg-gray-900 border-b border-gray-800 flex justify-between items-center px-6">
                            <span class="font-bold text-blue-400 text-sm">${p.n}</span>
                            <span id="score_${p.id}" class="score-badge neutral-color">0.00</span>
                        </div>
                        <div id="c_${p.id}" style="height:250px;"></div>
                        <div id="t_${p.id}" style="height:350px;"></div>
                    </div>`;
                setTimeout(() => {
                    new TradingView.widget({"autosize":true, "symbol":p.s, "interval":"1", "theme":"dark", "container_id":`c_${p.id}`, "hide_top_toolbar":true, "backgroundColor":"#0E141B", "hide_legend": true});
                    const s = document.createElement('script');
                    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
                    s.async = true;
                    s.innerHTML = JSON.stringify({"interval":"1m", "width":"100%", "height":"100%", "symbol":p.s, "colorTheme":"dark", "locale":"ar", "isTransparent": true});
                    document.getElementById(`t_${p.id}`).appendChild(s);
                }, 800);
            });
        }
        init();
    </script>
</body>
</html>
