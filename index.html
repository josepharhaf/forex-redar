<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار القناص - تنبيهات صوتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; font-family: sans-serif; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.2rem; overflow: hidden; margin-bottom: 2.5rem; }
        .btn-activate { background: linear-gradient(to right, #1E40AF, #3B82F6); color: white; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <button onclick="enableAllSystems()" class="btn-activate">🔊 تفعيل نظام التنبيهات والصوت</button>
        
        <div id="radar-grid"></div>
    </div>

    <script>
        // قائمة الأصول الأساسية
        const assets = [
            { symbol: "OANDA:XAUUSD", name: "الذهب GOLD", id: "gold" },
            { symbol: "BINANCE:BTCUSDT", name: "بيتكوين BTC", id: "btc" },
            { symbol: "FX:EURUSD", name: "اليورو دولار EUR/USD", id: "eurusd" },
            { symbol: "FX:GBPUSD", name: "الباوند دولار GBP/USD", id: "gbpusd" },
            { symbol: "FX:USDJPY", name: "الدولار ين USD/JPY", id: "usdjpy" }
        ];

        // صوت التنبيه (تردد احترافي قصير)
        const audioAlert = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        function enableAllSystems() {
            // تفعيل الإشعارات
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("النظام يعمل", { body: "تم تفعيل الصوت والإشعارات بنجاح" });
                    audioAlert.play(); // تجربة الصوت عند التفعيل
                }
            });
        }

        // دالة إرسال التنبيه الصوتي والمرئي
        function triggerAlert(assetName, direction) {
            if (Notification.permission === "granted") {
                new Notification(`إشارة قوية: ${assetName}`, {
                    body: `الاتجاه: ${direction} | المدة: 1-2 دقيقة`,
                });
                audioAlert.play(); // تشغيل الصوت
            }
        }

        function init() {
            const grid = document.getElementById('radar-grid');
            assets.forEach(asset => {
                const card = document.createElement('div');
                card.className = "asset-card";
                card.innerHTML = `
                    <div class="p-4 bg-[#151D27] flex justify-between">
                        <span class="font-bold text-blue-400">${asset.name}</span>
                        <span class="text-[10px] text-gray-500 font-bold">1M ANALYSIS</span>
                    </div>
                    <div id="sig_${asset.id}" style="height: 420px;"></div>
                `;
                grid.appendChild(card);
                
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "interval": "1m", "width": "100%", "isTransparent": true, "height": "100%",
                    "symbol": asset.symbol, "showIntervalTabs": false, "locale": "ar", "colorTheme": "dark"
                });
                document.getElementById(`sig_${asset.id}`).appendChild(script);
            });
        }

        init();
    </script>
</body>
</html>
