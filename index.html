<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار جوزيف - نظام النبضة</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        /* مؤقت الشمعة */
        .timer-box { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .timer-text { color: #00ff88; font-size: 20px; font-weight: bold; }

        /* حالة النظام */
        .status-bar { background: #004d2c; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }

        /* شبكة اختيار العملات */
        .pairs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; background: #161a1e; padding: 15px; border-radius: 12px; }
        .pair-item { background: #2b3139; padding: 8px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }

        /* منطقة الشارت */
        #chart-section { background: #161a1e; border-radius: 15px; padding: 10px; margin-top: 10px; border: 1px solid #333; }
        .chart-title { color: #4a90e2; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        #tv_chart { height: 400px; width: 100%; border-radius: 8px; overflow: hidden; }

        /* التحليل الفني */
        .ta-widget { margin-top: 15px; }
    </style>
</head>
<body>

    <div class="timer-box">
        ⏳ المتبقي للشمعة: <span id="timer" class="timer-text">-- ثانية</span>
    </div>

    <div class="status-bar">
        🎯 النظام يعمل (نبضة: <span id="pulse-count">202</span>)
    </div>

    <div class="pairs-grid" id="pairs-list">
        </div>

    <div id="chart-section">
        <div class="chart-title" id="current-pair-display">EUR/USD</div>
        <div id="tv_chart"></div>
        
        <div class="ta-widget">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1m", "width": "100%", "isTransparent": true, "height": "380",
                    "symbol": "FX_IDC:EURUSD", "showIntervalTabs": true, "displayMode": "single",
                    "locale": "ar", "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // قائمة العملات كما في صورتك
        const pairs = ["AUD/USD", "USD/JPY", "GBP/USD", "NZD/USD", "USD/CHF", "USD/CAD", "GBP/JPY", "EUR/JPY", "EUR/GBP", "EUR/CAD", "AUD/JPY"];
        const grid = document.getElementById('pairs-list');

        pairs.forEach(p => {
            grid.innerHTML += `
                <div class="pair-item">
                    <span>${p}</span>
                    <input type="checkbox" name="pair" value="${p.replace('/','')}" ${p === 'EUR/USD' ? 'checked' : ''} onclick="updateChart('${p}')">
                </div>
            `;
        });

        // مؤقت الشمعة (1 دقيقة)
        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const seconds = 60 - now.getSeconds();
                document.getElementById('timer').innerText = seconds + " ثانية";
                if(seconds > 30) document.getElementById('timer').style.color = "#00ff88";
                else document.getElementById('timer').style.color = "#ff4d4d";
            }, 1000);
        }

        // تحديث الشارت
        function updateChart(pairLabel) {
            const symbol = pairLabel.replace('/', '');
            document.getElementById('current-pair-display').innerText = pairLabel;
            
            new TradingView.Widget({
                "autosize": true, "symbol": "FX_IDC:" + symbol, "interval": "1",
                "timezone": "Etc/UTC", "theme": "dark", "style": "1",
                "locale": "ar", "enable_publishing": false, "container_id": "tv_chart"
            });
        }

        // التشغيل الأولي
        startTimer();
        updateChart('EUR/USD');
    </script>
</body>
</html>
