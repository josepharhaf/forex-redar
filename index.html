<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبضة الرادار - جوزيف V1.0</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .nav-bar { background: #1e2329; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #f0b90b; overflow-x: auto; }
        .btn-pair { background: #2b3139; color: #f0b90b; border: 1px solid #474d57; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .btn-pair:hover { background: #f0b90b; color: black; }
        .active { background: #f0b90b; color: black; }
        #chart-container { width: 100vw; height: calc(100vh - 60px); }
        .footer-info { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #848e9c; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-pair active" onclick="changeSymbol('EURUSD')">EUR/USD</button>
        <button class="btn-pair" onclick="changeSymbol('GBPUSD')">GBP/USD</button>
        <button class="btn-pair" onclick="changeSymbol('USDJPY')">USD/JPY</button>
        <button class="btn-pair" onclick="changeSymbol('AUDUSD')">AUD/USD</button>
        <button class="btn-pair" onclick="changeSymbol('XAUUSD')">GOLD (الذهب)</button>
        <button class="btn-pair" onclick="changeSymbol('BTCUSD')">BTC/USD</button>
    </div>

    <div id="chart-container">
        <div id="tradingview_widget"></div>
    </div>

    <div class="footer-info">رادار النبضة المباشر - تحديث كل 1 ثانية</div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        let currentSymbol = "EURUSD";

        function renderChart(symbol) {
            new TradingView.Widget({
                "autosize": true,
                "symbol": "FX_IDC:" + symbol,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "ar",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "details": true,
                "hotlist": true,
                "calendar": true,
                "container_id": "tradingview_widget"
            });
        }

        function changeSymbol(symbol) {
            currentSymbol = symbol;
            // تحديث الأزرار
            const buttons = document.querySelectorAll('.btn-pair');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(symbol.substring(0,3))) btn.classList.add('active');
            });
            // إعادة بناء الشارت بالعملة الجديدة
            renderChart(symbol);
        }

        // تشغيل الشارت الافتراضي عند الفتح
        renderChart(currentSymbol);
    </script>
</body>
</html>
