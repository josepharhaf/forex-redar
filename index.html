<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار جوزيف الذكي V63.9</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        .header { padding: 10px; background: #1e2329; border-bottom: 2px solid #f0b90b; position: sticky; top: 0; z-index: 100; }
        #signal-container { padding: 15px; min-height: 130px; }
        .card { max-width: 400px; margin: auto; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #161a1e; }
        .buy { border-color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .sell { border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .pair-name { font-size: 22px; font-weight: bold; color: #f0b90b; }
        .price-val { font-size: 30px; margin: 5px 0; font-family: monospace; }
        #chart-box { width: 100%; height: 500px; margin-top: 10px; background: #000; }
        .btn-link { display: inline-block; margin-top: 10px; padding: 8px 20px; background: #f0b90b; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h3>💎 رادار الاكتساح V63.9</h3></div>

    <div id="signal-container">
        <div id="display" class="card">
            <p>بإنتظار الإشارة القادمة لتغيير الشارت...</p>
        </div>
    </div>

    <div id="chart-box" id="tv_container">
        <div id="player"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://forex-radar-joseph-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('liveSignal');

        function loadChart(pair) {
            // تنظيف اسم الزوج ليتناسب مع TradingView (إزالة الشرطة وتحويله لكبير)
            let clean = pair.replace('_', '').replace('/', '').toUpperCase();
            
            // تصحيح خاص للذهب
            if (clean.includes("XAU")) clean = "XAUUSD";

            const url = `https://www.tradingview.com/widgetembed/?symbol=FX_IDC:${clean}&interval=1&theme=dark&style=1&timezone=Etc%2FUTC&locale=ar`;
            
            document.getElementById('chart-box').innerHTML = `
                <iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            `;
        }

        // تحميل شارت مبدئي
        loadChart('EUR_USD');

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.pair !== "نظام الاكتساح") {
                const display = document.getElementById('display');
                const isBuy = data.side === 'BUY';
                
                display.className = `card ${isBuy ? 'buy' : 'sell'}`;
                display.innerHTML = `
                    <div class="pair-name">${data.pair}</div>
                    <div class="price-val">${data.price}</div>
                    <div style="color: ${isBuy ? '#00ff88' : '#ff4d4d'}; font-weight:bold;">
                        ${isBuy ? '▲ شراء (CALL)' : '▼ بيع (PUT)'}
                    </div>
                    <a href="https://pocketoption.com/smart-trading/" target="_blank" class="btn-link">دخول الصفقة الآن</a>
                `;

                // تغيير الشارت فوراً للزوج الجديد
                loadChart(data.pair);

                // صوت تنبيه
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });
    </script>
</body>
</html>
