<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار أرهاف الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; text-align: center; font-family: sans-serif; }
        .filter-section { background: #0E141B; border: 1px solid #1E293B; border-radius: 1rem; padding: 15px; margin-bottom: 20px; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2.5rem; }
        .score-badge { padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .buy-color { background: #00897b; color: white; }
        .sell-color { background: #ff5252; color: white; }
        .neutral-color { background: #546e7a; color: white; }
    </style>
</head>
<body class="p-4">

    <h1 class="text-blue-500 font-black mb-4 italic text-lg uppercase">ARHAF DIGITAL RADAR</h1>

    <div class="filter-section max-w-4xl mx-auto shadow-2xl">
        <p class="text-[10px] text-gray-500 mb-2 uppercase font-bold">المحرك الرقمي اللحظي:</p>
        <div id="filter-controls" class="flex flex-wrap justify-center"></div>
    </div>

    <button id="actionBtn" onclick="activateEngine()" class="max-w-4xl w-full p-4 bg-blue-600 rounded-xl font-bold mb-6 hover:bg-blue-500 transition-all shadow-lg active:scale-95">
        🚀 تشغيل الرادار الرقمي التلقائي
    </button>
    
    <div id="radar-grid" class="max-w-4xl mx-auto"></div>

    <script>
        const BOT_TOKEN = "7736594416:AAHZhDMnQmtASFPkKJC4fKIIr8Z-e7UXtak"; 
        const CHAT_ID = "1234596704"; 

        const pairs = [
            {s:"OANDA:XAUUSD", n:"الذهب GOLD", id:"gold", ticker:"OANDA:XAUUSD"},
            {s:"FX:EURUSD", n:"EUR/USD", id:"eurusd", ticker:"FX:EURUSD"},
            {s:"FX:GBPUSD", n:"GBP/USD", id:"gbpusd", ticker:"FX:GBPUSD"},
            {s:"FX:USDJPY", n:"USD/JPY", id:"usdjpy", ticker:"FX:USDJPY"},
            {s:"FX:AUDUSD", n:"AUD/USD", id:"audusd", ticker:"FX:AUDUSD"},
            {s:"FX:USDCAD", n:"USD/CAD", id:"usdcad", ticker:"FX:USDCAD"}
        ];

        let isEngineActive = false;
        let lastAlertTime = {};

        async function checkSignals() {
            if (!isEngineActive) return;

            try {
                const response = await fetch('https://scanner.tradingview.com/forex/scan', {
                    method: 'POST',
                    body: JSON.stringify({
                        "symbols": { "tickers": pairs.map(p => p.ticker) },
                        "columns": ["Recommend.All"]
                    })
                });
                const data = await response.json();

                data.data.forEach((result, index) => {
                    const score = parseFloat(result.d[0]).toFixed(2); // تحويل النتيجة لرقم عشري
                    const pairId = pairs[index].id;
                    const pairName = pairs[index].n;

                    // تحديث الرقم في الصفحة
                    const badge = document.getElementById(`score_${pairId}`);
                    if (badge) {
                        badge.innerHTML = `الزخم: ${score}`;
                        badge.className = `score-badge ${score >= 0.5 ? 'buy-color' : (score <= -0.5 ? 'sell-color' : 'neutral-color')}`;
                    }

                    // إرسال تنبيه إذا تجاوزت القوة 0.5 (شراء) أو -0.5 (بيع)
                    if (score <= -0.5) {
                        sendTeleAlert(pairName, score, "🔴 بيع قوي");
                    } else if (score >= 0.5) {
                        sendTeleAlert(pairName, score, "🟢 شراء قوي");
                    }
                });
            } catch (e) { console.error("API Error"); }
        }

        function sendTeleAlert(name, score, type) {
            const now = Date.now();
            if (lastAlertTime[name] && (now - lastAlertTime[name] < 180000)) return;

            const message = `📊 <b>إشارة رقمية مؤكدة!</b>\n\n💰 الزوج: <b>${name}</b>\n⚡ القوة الرقمية: <b>${score}</b>\n🎯 الحالة: <b>${type}</b>\n\n🛡 <i>تم التحقق من 26 مؤشر فني</i>`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`);
            lastAlertTime[name] = now;
        }

        function activateEngine() {
            isEngineActive = true;
            document.getElementById('actionBtn').className = "max-w-4xl w-full p-4 bg-green-700 rounded-xl font-bold mb-6 transition-all";
            document.getElementById('actionBtn').innerHTML = "🎯 المحرك الرقمي يراقب الأسواق...";
            setInterval(checkSignals, 10000); // فحص سريع كل 10 ثوانٍ
        }

        function init() {
            const grid = document.getElementById('radar-grid');
            const controls = document.getElementById('filter-controls');
            pairs.forEach(p => {
                controls.innerHTML += `<label class="checkbox-item"><input type="checkbox" id="check_${p.id}" checked> ${p.n}</label>`;
                grid.innerHTML += `
                    <div class="asset-card" id="card_${p.id}">
                        <div class="p-2 bg-gray-900 font-bold text-blue-400 border-b border-gray-800 text-sm flex justify-between px-4">
                            <span>${p.n}</span>
                            <span id="score_${p.id}" class="score-badge neutral-color">جاري الحساب...</span>
                        </div>
                        <div id="c_${p.id}" style="height:250px;"></div>
                        <div id="t_${p.id}" style="height:380px;"></div>
                    </div>`;
                setTimeout(() => {
                    new TradingView.widget({"autosize":true, "symbol":p.s, "interval":"1", "theme":"dark", "container_id":`c_${p.id}`, "hide_top_toolbar":true, "backgroundColor":"#0E141B"});
                    const s = document.createElement('script');
                    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
                    s.async = true;
                    s.innerHTML = JSON.stringify({"interval":"1m", "width":"100%", "height":"100%", "symbol":p.s, "colorTheme":"dark", "locale":"ar"});
                    document.getElementById(`t_${p.id}`).appendChild(s);
                }, 1000);
            });
        }
        init();
    </script>
</body>
</html>
