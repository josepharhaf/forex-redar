<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار أرهاف - Arhaf Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; text-align: center; font-family: sans-serif; }
        .filter-section { background: #0E141B; border: 1px solid #1E293B; border-radius: 1rem; padding: 15px; margin-bottom: 20px; }
        .asset-card { background: #0E141B; border: 1px solid #1E293B; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2.5rem; display: none; }
        .asset-card.active { display: block; }
        .checkbox-item { display: inline-flex; align-items: center; background: #151D27; padding: 5px 12px; border-radius: 8px; margin: 4px; border: 1px solid #1E293B; cursor: pointer; font-size: 11px; }
        .checkbox-item input { margin-left: 8px; }
    </style>
</head>
<body class="p-4">

    <h1 class="text-blue-500 font-black mb-4 italic text-lg uppercase">ARHAF RADAR PRO</h1>

    <div class="filter-section max-w-4xl mx-auto shadow-xl">
        <p class="text-[10px] text-gray-500 mb-2 uppercase font-bold">حالة البوت: <span id="tele-status" class="text-green-500">متصل بـ @Arhaf_bot ✅</span></p>
        <div id="filter-controls" class="flex flex-wrap justify-center"></div>
    </div>

    <button id="actionBtn" onclick="runPulseSystem()" class="max-w-4xl w-full p-4 bg-blue-600 rounded-xl font-bold mb-6 hover:bg-blue-500 transition-all shadow-lg active:scale-95">
        🚀 تشغيل نظام المراقبة والإرسال لـ Arhaf
    </button>
    
    <div id="radar-grid" class="max-w-4xl mx-auto"></div>

    <script>
        // --- إعدادات البوت التي زودتني بها ---
        const BOT_TOKEN = "7736594416:AAHZhDMnQmtASFPkKJC4fKIIr8Z-e7UXtak"; 
        const CHAT_ID = "1234596704"; 

        const pairs = [
            {s:"OANDA:XAUUSD", n:"الذهب GOLD", id:"gold"},
            {s:"FX:EURUSD", n:"EUR/USD", id:"eurusd"},
            {s:"FX:GBPUSD", n:"GBP/USD", id:"gbpusd"},
            {s:"FX:USDJPY", n:"USD/JPY", id:"usdjpy"},
            {s:"FX:AUDUSD", n:"AUD/USD", id:"audusd"},
            {s:"FX:USDCAD", n:"USD/CAD", id:"usdcad"},
            {s:"FX:EURJPY", n:"EUR/JPY", id:"eurjpy"},
            {s:"FX:GBPJPY", n:"GBP/JPY", id:"gbpjpy"},
            {s:"FX:NZDUSD", n:"NZD/USD", id:"nzdusd"},
            {s:"FX:EURGBP", n:"EUR/GBP", id:"eurgbp"},
            {s:"FX:EURCAD", n:"EUR/CAD", id:"eurcad"},
            {s:"FX:AUDJPY", n:"AUD/JPY", id:"audjpy"}
        ];

        function sendToArhaf(pairName, signal) {
            const icon = signal.includes("BUY") ? "🟢" : "🔴";
            const message = `${icon} <b>إشارة اكتساح Arhaf!</b>\n\n💰 الزوج: <b>${pairName}</b>\n⚡ الحالة: <b>${signal}</b>\n⏱ الفريم: 1 دقيقة\n\n🛡 <i>تم التأكيد بواسطة 26 مؤشر فني</i>`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
            fetch(url).then(() => console.log("Sent to Telegram"));
        }

        function runPulseSystem() {
            const btn = document.getElementById('actionBtn');
            btn.classList.replace('bg-blue-600', 'bg-green-700');
            btn.innerHTML = "🎯 نظام أرهاف يراقب الأسواق الآن...";
            
            // رسالة ترحيبية فورية عند التشغيل
            const welcomeMsg = "🚀 <b>نظام أرهاف متصل بنجاح!</b>\n\nيتم الآن مراقبة جميع العملات المختارة. ستصلك هنا أقوى إشارات الاكتساح فور ظهورها.";
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(welcomeMsg)}&parse_mode=HTML`;
            fetch(url);
        }

        function init() {
            const grid = document.getElementById('radar-grid');
            const controls = document.getElementById('filter-controls');
            pairs.forEach(p => {
                controls.innerHTML += `
                    <label class="checkbox-item">
                        <input type="checkbox" id="check_${p.id}" onchange="toggleAsset('${p.id}')" checked>
                        ${p.n}
                    </label>`;
                grid.innerHTML += `
                    <div class="asset-card active" id="card_${p.id}">
                        <div class="p-2 bg-gray-900 font-bold text-blue-400 border-b border-gray-800 text-sm flex justify-between px-4">
                            <span>${p.n}</span>
                            <span class="text-gray-600">LIVE</span>
                        </div>
                        <div id="c_${p.id}" style="height:250px;"></div>
                        <div id="t_${p.id}" style="height:380px;"></div>
                    </div>`;
                setTimeout(() => {
                    new TradingView.widget({"autosize":true, "symbol":p.s, "interval":"1", "theme":"dark", "container_id":`c_${p.id}`, "hide_top_toolbar":true, "backgroundColor":"#0E141B"});
                    const s = document.createElement('script');
                    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
                    s.async = true;
                    s.innerHTML = JSON.stringify({"interval":"1m", "width":"100%", "height":"100%", "symbol":p.s, "colorTheme":"dark", "locale":"ar"});
                    document.getElementById(`t_${p.id}`).appendChild(s);
                }, 1000);
            });
        }
        function toggleAsset(id) {
            const card = document.getElementById(`card_${id}`);
            const checkbox = document.getElementById(`check_${id}`);
            card.className = checkbox.checked ? 'asset-card active' : 'asset-card';
        }
        init();
    </script>
</body>
</html>
