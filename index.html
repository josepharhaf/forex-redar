<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار القناص - وضع النبض</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #05070A; color: white; text-align: center; font-family: sans-serif; }
        .active-pulse { animation: shadow-pulse 1.5s infinite; background: #064E3B !important; }
        @keyframes shadow-pulse { 0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="p-4">

    <button id="actionBtn" onclick="runPulseSystem()" class="w-full p-5 bg-blue-600 rounded-2xl font-black mb-2 transition-all duration-500">
        🚀 تشغيل رادار النبض اللحظي
    </button>
    
    <div id="statusUpdate" class="text-[10px] text-gray-500 mb-6 uppercase tracking-tighter">
        الحالة: بانتظار إشارة البدء...
    </div>

    <div id="radar-grid" class="max-w-4xl mx-auto space-y-8"></div>

    <script>
        const alertSound = new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3');
        let seconds = 0;

        function runPulseSystem() {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') {
                    const btn = document.getElementById('actionBtn');
                    const status = document.getElementById('statusUpdate');
                    
                    btn.classList.add('active-pulse');
                    alertSound.play();

                    // بدء العداد التنازلي للتأكيد أن النظام يعمل
                    setInterval(() => {
                        seconds++;
                        btn.innerHTML = `🎯 الرادار يعمل بنجاح (نبضة رقم: ${seconds})`;
                        status.innerHTML = `✅ فحص نشط لـ RSI و MACD | النظام مستيقظ الآن`;
                        status.style.color = "#10B981";
                    }, 1000);
                }
            });
        }

        // إعداد الشاشات
        const pairs = [{s:"XAUUSD", n:"الذهب"}, {s:"EURUSD", n:"اليورو دولار"}];
        function init() {
            const grid = document.getElementById('radar-grid');
            pairs.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-[#0E141B] rounded-3xl border border-gray-800 overflow-hidden">
                        <div class="p-3 bg-gray-900 font-bold text-blue-400">${p.n}</div>
                        <div id="c_${p.s}" style="height:300px;"></div>
                        <div id="t_${p.s}" style="height:400px;"></div>
                    </div>`;
                setTimeout(() => {
                    new TradingView.widget({"autosize":true,"symbol":p.s,"interval":"1","theme":"dark","container_id":`c_${p.s}`,"hide_top_toolbar":true});
                    const s = document.createElement('script');
                    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
                    s.async = true;
                    s.innerHTML = JSON.stringify({"interval":"1m","width":"100%","height":"100%","symbol":p.s,"colorTheme":"dark","locale":"ar"});
                    document.getElementById(`t_${p.s}`).appendChild(s);
                }, 500);
            });
        }
        init();
    </script>
</body>
</html>
