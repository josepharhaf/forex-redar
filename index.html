<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار جوزيف الاحترافي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e2329; border-radius: 20px; padding: 30px; border: 2px solid #333; margin-top: 50px; transition: 0.5s; }
        .buy-alert { border-color: #00ff88; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .sell-alert { border-color: #ff4d4d; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2); }
        .pair { font-size: 35px; font-weight: bold; letter-spacing: 2px; }
        .price { font-size: 45px; margin: 20px 0; font-family: monospace; }
        .direction { font-size: 24px; font-weight: bold; padding: 10px; border-radius: 10px; }
        .btn-pocket { background: #f0b90b; color: black; padding: 15px 40px; border-radius: 10px; text-decoration: none; display: inline-block; margin-top: 30px; font-weight: bold; font-size: 20px; }
        .footer { margin-top: 40px; color: #848e9c; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 رادار الاكتساح المباشر</h1>
        <div id="signal-box">
            <div class="card">
                <p>بإنتظار الإشارة الأولى من نظام V63...</p>
            </div>
        </div>
        <div class="footer">تحديث لحظي عبر OANDA API</div>
    </div>

    <script>
        // إعدادات الربط (Firebase Config)
        // ملاحظة: يمكنك إنشاء قاعدة بيانات مجانية على firebase.google.com ووضع إعداداتك هنا
        const firebaseConfig = {
            databaseURL: "https://forex-radar-joseph-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const signalRef = firebase.database().ref('liveSignal');

        signalRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const box = document.getElementById('signal-box');
                const isBuy = data.side === 'BUY';
                const themeClass = isBuy ? 'buy-alert' : 'sell-alert';
                const dirText = isBuy ? '▲ شراء (CALL)' : '▼ بيع (PUT)';
                const dirColor = isBuy ? '#00ff88' : '#ff4d4d';

                box.innerHTML = `
                    <div class="card ${themeClass}">
                        <div class="pair">${data.pair}</div>
                        <div class="price">${data.price}</div>
                        <div class="direction" style="color: ${dirColor}">${dirText}</div>
                        <a href="https://pocketoption.com/smart-trading/" target="_blank" class="btn-pocket">دخول الصفقة الآن</a>
                    </div>
                `;
                
                // تنبيه صوتي عند وصول إشارة جديدة
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });
    </script>
</body>
</html>
