<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الفوركس - جوزيف</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .signal-card { background: #1e2329; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #333; transition: 0.3s; }
        .buy { border-color: #00ff88; box-shadow: 0 0 15px #00ff8833; }
        .sell { border-color: #ff4d4d; box-shadow: 0 0 15px #ff4d4d33; }
        h1 { color: #f0b90b; }
        .pair-name { font-size: 24px; font-weight: bold; }
        .price { font-size: 32px; margin: 10px 0; }
        .status { font-size: 18px; padding: 5px 15px; border-radius: 5px; display: inline-block; }
        .status.buy { background: #00ff88; color: black; }
        .status.sell { background: #ff4d4d; color: white; }
        .time { color: #848e9c; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 رادار الاكتساح V63</h1>
        <div id="signal-display">
            <div class="signal-card">
                <p>بإنتظار الإشارة الأولى من الرادار...</p>
            </div>
        </div>
    </div>

    <script>
        // دالة لتحديث الشاشة عند تلقي إشارة جديدة
        function updateSignal(pair, side, price) {
            const display = document.getElementById('signal-display');
            const colorClass = side === 'BUY' ? 'buy' : 'sell';
            const sideText = side === 'BUY' ? 'شراء (CALL)' : 'بيع (PUT)';
            
            display.innerHTML = `
                <div class="signal-card ${colorClass}">
                    <div class="pair-name">${pair}</div>
                    <div class="price">${price}</div>
                    <div class="status ${colorClass}">${sideText}</div>
                    <div class="time">توقيت الإشارة: ${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            
            // تنبيه صوتي بسيط
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.play();
        }

        // ملاحظة: لربط الكود البرمجي مباشرة، سنحتاج لاستخدام Firebase أو مكتبة بسيطة
        // حالياً الصفحة مهيأة لاستقبال البيانات.
    </script>
</body>
</html>
