<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار جوزيف V63.9</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; background: #1e2329; border-bottom: 2px solid #f0b90b; }
        #signal-container { padding: 20px; min-height: 150px; }
        .card { max-width: 450px; margin: auto; padding: 20px; border-radius: 15px; border: 2px solid #333; background: #161a1e; transition: 0.5s; }
        .buy { border-color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .sell { border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
        .pair-name { font-size: 24px; font-weight: bold; color: #f0b90b; }
        .price-val { font-size: 35px; margin: 5px 0; font-family: monospace; }
        #chart-box { width: 95%; margin: 10px auto; border-radius: 10px; overflow: hidden; border: 1px solid #333; height: 500px; }
        .btn-link { display: inline-block; margin-top: 10px; padding: 8px 20px; background: #f0b90b; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>💎 رادار الاكتساح المباشر</h1></div>

    <div id="signal-container">
        <div id="display" class="card">
            <p id="msg">بإنتظار تشغيل الكود من Google Colab...</p>
        </div>
    </div>

    <div id="chart-box">
        <iframe src="https://www.tradingview.com/widgetembed/?symbol=FX_IDC:EURUSD&interval=1&theme=dark&style=1&timezone=Etc%2FUTC&locale=ar" 
                width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://forex-radar-joseph-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('liveSignal');

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const display = document.getElementById('display');
                const isBuy = data.side === 'BUY';
                display.className = `card ${isBuy ? 'buy' : 'sell'}`;
                display.innerHTML = `
                    <div class="pair-name">${data.pair}</div>
                    <div class="price-val">${data.price}</div>
                    <div style="color: ${isBuy ? '#00ff88' : '#ff4d4d'}; font-weight:bold;">
                        ${isBuy ? '▲ شراء (CALL)' : '▼ بيع (PUT)'}
                    </div>
                    <div style="font-size:12px; color:#848e9c; margin-top:5px;">تحديث: ${data.time}</div>
                    <a href="https://pocketoption.com/smart-trading/" target="_blank" class="btn-link">فتح Pocket Option</a>
                `;
                if(data.pair !== "نظام الاكتساح") new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });
    </script>
</body>
</html>
